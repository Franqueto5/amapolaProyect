<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Archivos y Puertos Serie</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Gestor de Programas</h1>
  </header>
  <main>
    <section id="files-section">
      <h2>Archivos Disponibles</h2>
      <div id="files-container" class="file-grid"></div>
    </section>
    <section id="serial-section">
      <h2>Puertos Serie</h2>
      <div class="serial-controls">
        <button id="scan-ports">Escanear Puertos</button>
        <select id="ports-list"></select>
        <button id="connect-port">Conectar</button>
        <span id="device-name">Sin conexión</span>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
